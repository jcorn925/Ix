name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cli:
    name: CLI (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.14"
          cache: "npm"
          cache-dependency-path: |
            ix-cli/package-lock.json
            core-ingestion/package-lock.json
      - name: Install core-ingestion deps
        working-directory: core-ingestion
        run: npm ci --silent
      - name: Install & Build
        working-directory: ix-cli
        run: |
          npm ci --silent
          npm run build
      - name: Test
        working-directory: ix-cli
        run: npm test

  backend:
    name: Backend (Scala)
    runs-on: ubuntu-latest

    services:
      arangodb:
        image: arangodb:3.12
        ports:
          - 8529:8529
        env:
          ARANGO_NO_AUTH: "1"
        options: >-
          --health-cmd "arangosh --server.authentication false --server.endpoint tcp://127.0.0.1:8529 --javascript.execute-string 'db._version()'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "sbt"
      - uses: sbt/setup-sbt@dd1ef7d7798fab5ce802a6adab3b782817b8c2d0 # v1.1.20
      - name: Compile
        run: sbt compile
      - name: Test
        run: sbt test
      - name: Assembly
        run: sbt "memoryLayer/assembly"
