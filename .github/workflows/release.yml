name: Release

# ─────────────────────────────────────────────────────────────────────────────
# Triggered by pushing a version tag:    git tag v0.3.0 && git push origin v0.3.0
#
# What it does (in order):
#   1. Builds the TypeScript CLI
#   2. Packages CLI tarballs for linux, macOS (amd64+arm64), Windows
#   3. Creates a GitHub Release with all assets + install instructions
#   4. Updates the Homebrew formula with the new SHA and commits it
#
# Note: The Scala backend (memory-layer) is built and released separately
# from the private ix-memory-layer repo. Docker images are pushed to
# ghcr.io/ix-infrastructure/ix-memory-layer from that repo.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.4.9)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # ── 1. Build CLI ────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22.14"
          cache: "npm"
          cache-dependency-path: ix-cli/package-lock.json

      - name: Build core-ingestion
        working-directory: core-ingestion
        run: npm ci --silent

      - name: Build CLI
        working-directory: ix-cli
        run: |
          npm ci --silent
          npm run build
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      # ── 1b. Build System Compass (optional — needs COMPASS_TOKEN secret) ─
      - name: Build System Compass
        continue-on-error: true
        env:
          COMPASS_TOKEN: ${{ secrets.COMPASS_TOKEN }}
        run: |
          if [ -z "$COMPASS_TOKEN" ]; then
            echo "COMPASS_TOKEN not set — skipping compass build"
            exit 0
          fi
          git clone https://x-access-token:${COMPASS_TOKEN}@github.com/ix-infrastructure/system-compass.git
          cd system-compass
          npm ci --legacy-peer-deps
          npm run build
          # Verify the build produced output
          if [ ! -f dist/index.html ]; then
            echo "::error::Compass build did not produce dist/index.html"
            exit 1
          fi

      # ── 2. Package CLI tarballs ─────────────────────────────────────────
      - name: Package CLI (linux-amd64)
        run: |
          STAGING="ix-${{ steps.version.outputs.version }}-linux-amd64"
          mkdir -p "$STAGING/cli" "$STAGING/core-ingestion" "$STAGING/compass"
          cp -r ix-cli/dist ix-cli/node_modules ix-cli/package.json "$STAGING/cli/"
          cp -r core-ingestion/dist core-ingestion/node_modules core-ingestion/package.json "$STAGING/core-ingestion/"
          [ -d system-compass/dist ] && cp -r system-compass/dist/* "$STAGING/compass/" || true
          cat > "$STAGING/ix" <<'WRAPPER'
          #!/bin/sh
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          exec node "$SCRIPT_DIR/cli/dist/cli/main.js" "$@"
          WRAPPER
          chmod +x "$STAGING/ix"
          tar -czf "$STAGING.tar.gz" "$STAGING"
          shasum -a 256 "$STAGING.tar.gz" > "$STAGING.tar.gz.sha256"

      - name: Package CLI (linux-arm64)
        run: |
          STAGING="ix-${{ steps.version.outputs.version }}-linux-arm64"
          mkdir -p "$STAGING/cli" "$STAGING/core-ingestion" "$STAGING/compass"
          cp -r ix-cli/dist ix-cli/node_modules ix-cli/package.json "$STAGING/cli/"
          cp -r core-ingestion/dist core-ingestion/node_modules core-ingestion/package.json "$STAGING/core-ingestion/"
          [ -d system-compass/dist ] && cp -r system-compass/dist/* "$STAGING/compass/" || true
          cat > "$STAGING/ix" <<'WRAPPER'
          #!/bin/sh
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          exec node "$SCRIPT_DIR/cli/dist/cli/main.js" "$@"
          WRAPPER
          chmod +x "$STAGING/ix"
          tar -czf "$STAGING.tar.gz" "$STAGING"
          shasum -a 256 "$STAGING.tar.gz" > "$STAGING.tar.gz.sha256"

      - name: Package CLI (darwin-amd64)
        run: |
          STAGING="ix-${{ steps.version.outputs.version }}-darwin-amd64"
          mkdir -p "$STAGING/cli" "$STAGING/core-ingestion" "$STAGING/compass"
          cp -r ix-cli/dist ix-cli/node_modules ix-cli/package.json "$STAGING/cli/"
          cp -r core-ingestion/dist core-ingestion/node_modules core-ingestion/package.json "$STAGING/core-ingestion/"
          [ -d system-compass/dist ] && cp -r system-compass/dist/* "$STAGING/compass/" || true
          cat > "$STAGING/ix" <<'WRAPPER'
          #!/bin/sh
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          exec node "$SCRIPT_DIR/cli/dist/cli/main.js" "$@"
          WRAPPER
          chmod +x "$STAGING/ix"
          tar -czf "$STAGING.tar.gz" "$STAGING"
          shasum -a 256 "$STAGING.tar.gz" > "$STAGING.tar.gz.sha256"

      - name: Package CLI (darwin-arm64)
        run: |
          STAGING="ix-${{ steps.version.outputs.version }}-darwin-arm64"
          mkdir -p "$STAGING/cli" "$STAGING/core-ingestion" "$STAGING/compass"
          cp -r ix-cli/dist ix-cli/node_modules ix-cli/package.json "$STAGING/cli/"
          cp -r core-ingestion/dist core-ingestion/node_modules core-ingestion/package.json "$STAGING/core-ingestion/"
          [ -d system-compass/dist ] && cp -r system-compass/dist/* "$STAGING/compass/" || true
          cat > "$STAGING/ix" <<'WRAPPER'
          #!/bin/sh
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          exec node "$SCRIPT_DIR/cli/dist/cli/main.js" "$@"
          WRAPPER
          chmod +x "$STAGING/ix"
          tar -czf "$STAGING.tar.gz" "$STAGING"
          shasum -a 256 "$STAGING.tar.gz" > "$STAGING.tar.gz.sha256"

      - name: Package CLI (windows-amd64)
        run: |
          STAGING="ix-${{ steps.version.outputs.version }}-windows-amd64"
          mkdir -p "$STAGING/cli" "$STAGING/core-ingestion" "$STAGING/compass"
          cp -r ix-cli/dist ix-cli/node_modules ix-cli/package.json "$STAGING/cli/"
          cp -r core-ingestion/dist core-ingestion/node_modules core-ingestion/package.json "$STAGING/core-ingestion/"
          [ -d system-compass/dist ] && cp -r system-compass/dist/* "$STAGING/compass/" || true
          cat > "$STAGING/ix.cmd" <<'WRAPPER'
          @echo off
          node "%~dp0cli\dist\cli\main.js" %*
          WRAPPER
          zip -r "$STAGING.zip" "$STAGING"
          shasum -a 256 "$STAGING.zip" > "$STAGING.zip.sha256"

      # ── 3. Create GitHub Release ────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Install

            ### Quick install (no repo needed)
            ```bash
            # macOS / Linux
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install/install.sh | bash

            # Windows (PowerShell)
            irm https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install/install.ps1 | iex

            # Homebrew
            brew tap ${{ github.repository_owner }}/ix https://github.com/${{ github.repository }}
            brew install ix
            ix docker start
            ```

            ### Docker image
            ```bash
            docker pull ghcr.io/ix-infrastructure/ix-memory-layer:latest
            ```
          files: |
            ix-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
            ix-${{ steps.version.outputs.version }}-linux-amd64.tar.gz.sha256
            ix-${{ steps.version.outputs.version }}-linux-arm64.tar.gz
            ix-${{ steps.version.outputs.version }}-linux-arm64.tar.gz.sha256
            ix-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz
            ix-${{ steps.version.outputs.version }}-darwin-amd64.tar.gz.sha256
            ix-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz
            ix-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz.sha256
            ix-${{ steps.version.outputs.version }}-windows-amd64.zip
            ix-${{ steps.version.outputs.version }}-windows-amd64.zip.sha256

      # ── 4. Update Homebrew formula via PR ──────────────────────────────
      - name: Update Homebrew formula
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz"
          SHA256=$(curl -sL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)

          sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" homebrew/ix.rb
          sed -i "s|# sha256 .*|sha256 \"${SHA256}\"|; s|sha256 \".*\"|sha256 \"${SHA256}\"|" homebrew/ix.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/brew-update-v${VERSION}"
          git checkout -b "$BRANCH"
          git add homebrew/ix.rb
          git commit -m "brew: update formula for v${VERSION}" || exit 0
          git push origin "$BRANCH"
          gh pr create --title "brew: update formula for v${VERSION}" --body "Auto-generated: updates Homebrew formula SHA for v${VERSION}" --base main
