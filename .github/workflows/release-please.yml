name: Release Please

# Runs on every push to main. Reads conventional commit messages (feat:, fix:,
# etc.) and either:
#   a) Opens/updates a "Release vX.Y.Z" PR with changelog, OR
#   b) If that PR was just merged, creates the tag → triggers release.yml
#
# You never need to manually create tags or version numbers.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
